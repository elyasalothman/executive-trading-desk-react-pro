<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Trading Desk | React Pro</title>

  <!-- تسريع الاتصال بمزوّدي الأدوات الخارجية -->
  <link rel="dns-prefetch" href="https://s3.tradingview.com">
  <link rel="preconnect" href="https://s3.tradingview.com" crossorigin>
  <link rel="dns-prefetch" href="https://unpkg.com">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <!-- وصف وظهور المشاركة -->
  <meta name="description" content="لوحة تداول تنفيذية: رسم بياني من TradingView، إدارة مخاطر، سجل صفقات، وإحصائيات أداء بواجهة عربية RTL.">
  <link rel="canonical" href="https://elyasalothman.github.io/executive-trading-desk-react-pro/" />

  <meta property="og:title" content="Executive Trading Desk | React Pro">
  <meta property="og:description" content="لوحة تداول تنفيذية بواجهة سهلة وإدارة مخاطر وسجل صفقات.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://elyasalothman.github.io/executive-trading-desk-react-pro/">
  <meta property="og:image" content="https://elyasalothman.github.io/executive-trading-desk-react-pro/og-image.png">

  <!-- لون شريط المتصفح حسب المظهر -->
  <meta name="theme-color" content="#0b0e14" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#eef2f8" media="(prefers-color-scheme: light)">

  <!-- أيقونة الموقع (ضع favicon.ico بجانب هذا الملف) -->
  <link rel="icon" href="./favicon.ico" />

  <!-- ملف التنسيق -->
  <link rel="stylesheet" href="./style.css" />

  <!-- تنسيق بسيط لتذييل الإصدار -->
  <style>
    .app-footer-version{ margin:16px auto 20px; max-width:980px; color:#8a93a6; text-align:center; font-size:.92rem }
    .app-footer-version .pill{ display:inline-flex; gap:8px; align-items:center; padding:8px 12px; border:1px solid rgba(128,128,128,.25); border-radius:999px; background:rgba(255,255,255,.04) }
  </style>
</head>
<body>
  <noscript>لتجربة كاملة، فعّل JavaScript.</noscript>
  <div id="root"></div>

  <!-- تثبيت نسخ الأدوات لتفادي تغيّرات مفاجئة -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- التطبيق (بـ JSX حاليًا) -->
  <script type="text/babel" data-presets="react" src="./app.js"></script>

  <!-- رسالة بديلة إذا تعذر تحميل أداة الرسم -->
  <script>
    setTimeout(() => {
      const el = document.getElementById('chart-host');
      if (el && !el.querySelector('iframe')) {
        el.innerHTML = '<div style="padding:16px;border:1px dashed var(--border);border-radius:12px;color:var(--muted);text-align:center">تعذّر تحميل أداة الرسم حاليًا. تأكد من الاتصال أو حدّث الصفحة.</div>';
      }
    }, 6000);
  </script>

  <!-- تذييل بسيط يعرض رقم الإصدار وتاريخ آخر تحديث -->
  <footer class="app-footer-version" dir="rtl">
    <span class="pill">🔖 الإصدار: v1.0.0 • آخر تحديث: 2026-03-28</span>
  </footer>
</body>
</html>
